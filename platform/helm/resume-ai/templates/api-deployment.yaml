apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-ai-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: api
    {{- include "resume-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/name: {{ include "resume-ai.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/name: {{ include "resume-ai.name" . }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: {{ .Values.api.env.environment | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.api.env.allowedOrigins | quote }}
            - name: REDIS_URL
              value: {{ .Values.api.env.redisUrl | quote }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

