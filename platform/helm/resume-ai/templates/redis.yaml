{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-ai-redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: redis
    {{- include "resume-ai.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      app.kubernetes.io/name: {{ include "resume-ai.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/name: {{ include "resume-ai.name" . }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: resume-ai-redis
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/name: {{ include "resume-ai.name" . }}
{{- end }}

