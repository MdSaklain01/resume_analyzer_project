apiVersion: v1
kind: Service
metadata:
  name: resume-ai-web
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: web
    {{- include "resume-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: 80
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: {{ include "resume-ai.name" . }}

