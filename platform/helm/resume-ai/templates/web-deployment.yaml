apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-ai-web
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: web
    {{- include "resume-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/name: {{ include "resume-ai.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: {{ include "resume-ai.name" . }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: resume-ai-web-nginx

