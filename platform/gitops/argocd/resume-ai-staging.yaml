apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resume-ai-staging
  namespace: argocd
spec:
  project: resume-ai
  source:
    repoURL: https://github.com/MdSaklain01/Resume_Analyzer_Project.git
    targetRevision: main
    path: platform/helm/resume-ai
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
      parameters:
        - name: api.image.repository
          value: ghcr.io/MdSaklain01/Resume_Analyzer_Project/resume-ai-api
        - name: web.image.repository
          value: ghcr.io/MdSaklain01/Resume_Analyzer_Project/resume-ai-web
  destination:
    server: https://kubernetes.default.svc
    namespace: resume-ai-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

