name: build-and-push-images

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
            echo "extra=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging" >> "$GITHUB_OUTPUT"
            echo "extra=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: apps/resume-ai-api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/resume-ai-api:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/resume-ai-api:${{ steps.meta.outputs.extra }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/resume-ai-web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/resume-ai-web:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/resume-ai-web:${{ steps.meta.outputs.extra }}
